version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    groups:
      deckgl:
        patterns:
          - "@deck.gl/*"
          - "@luma.gl/*"

  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # tangram_{jet1090|ship162} ---> tangram_history ---> deltalake-core ---> arrow
      #             \_______________________________________________________/
      - dependency-name: "arrow-*"
        update-types: ["version-update:semver-major", "version-update:semver-patch", "version-update:semver-minor"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
