name: docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"
      - "zensical.toml"
      - "pyproject.toml"
      - "uv.lock"
      - "packages/**/src/**/*.py"
      - "packages/**/src/**/*.pyi"

permissions:
  contents: write

jobs:
  deploy:
    # if: startsWith(github.ref, 'refs/tags/') # only deploy pages on release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build the site
        run: |
          uv sync --frozen --no-default-groups --group docs
          uv run --frozen --no-default-groups --group docs zensical build --clean --strict

      - name: Deploy pages to www.mode-s.org/tangram
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/
