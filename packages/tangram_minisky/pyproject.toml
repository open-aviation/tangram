[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "tangram_minisky"
version = "0.5.0"
readme = "readme.md"
dependencies = [
    "tangram_core>=0.5.0",
    "websockets>=13",
    "orjson>=3",
]
classifiers = ["Private :: Do Not Upload"]
authors = [
    { name = "Andres Morfin Veytia", email = "amorfinvdev@gmail.com" },
]

[project.entry-points."tangram_core.plugins"]
tangram_minisky = "tangram_minisky:plugin"

[tool.hatch.build.targets.sdist]
ignore-vcs = true
include = ["dist-frontend/*", "src/*", "package.json"]

[tool.hatch.build.targets.wheel.force-include]
"dist-frontend" = "tangram_minisky/dist-frontend"
"package.json" = "tangram_minisky/package.json"

[tool.uv.sources]
tangram_core = { workspace = true }
