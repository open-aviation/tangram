[package]
name = "tangram_jet1090"
description = "tangram plugin to track aircraft using jet1090"
readme = "../readme.md"
authors = ["Abraham Cheung <abraham@ylcheung.com>"]
version.workspace = true
license.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true

[lib]
name = "_planes"
crate-type = ["cdylib", "rlib"]

[dependencies]
tangram_core_rs = { path = "../../tangram_core/rust" }
tangram_history = { path = "../../tangram_history/rust", default-features = false, features = [
    "client",
] }
arrow-array = "58.0.0"
arrow-schema = "58.0.0"

anyhow = "1.0"
futures = "0.3"
redis = { version = "1.0.2", features = ["tokio-comp"] }
rs1090 = "0.6.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tokio-stream = "0.1"
tracing = "0.1"
tracing-appender = "0.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
nucleo-matcher = "0.3.1"

pyo3 = { version = "0.29", features = ["extension-module", "experimental-inspect"], optional = true }
pyo3-async-runtimes = { version = "0.29", features = [
    "attributes",
    "tokio-runtime",
], optional = true }


[features]
pyo3 = ["dep:pyo3", "dep:pyo3-async-runtimes", "tangram_history/pyo3"]
stubgen = ["pyo3"]