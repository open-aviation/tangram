[package]
name = "tangram_datalink"
description = "Tangram plugin for Redis-backed datalink visualization"
readme = "../readme.md"
authors = ["Abraham Cheung <abraham@ylcheung.com>"]
version.workspace = true
license.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true

[lib]
name = "_datalink"
crate-type = ["cdylib", "rlib"]

[dependencies]
tangram_core_rs = { path = "../../tangram_core/rust" }
# datalink = { path = "../../../../datalink/crates/datalink", default-features = false }
datalink = { version = "0.2.0", default-features = false }

anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
redis = { version = "1.0.2", features = ["tokio-comp"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
hex = "0.4"

pyo3 = { version = "0.29", features = ["extension-module", "experimental-inspect"], optional = true }
pyo3-async-runtimes = { version = "0.29", features = ["attributes", "tokio-runtime"], optional = true }


[features]
pyo3 = ["dep:pyo3", "dep:pyo3-async-runtimes"]
stubgen = ["pyo3"]
