[package]
name = "tangram_datalink"
description = "Tangram plugin for Redis-backed datalink visualization"
readme = "../readme.md"
authors = ["Abraham Cheung <abraham@ylcheung.com>"]
version.workspace = true
license.workspace = true
edition.workspace = true
repository.workspace = true
homepage.workspace = true

[lib]
name = "_datalink"
crate-type = ["cdylib", "rlib"]

[dependencies]
tangram_core_rs = { path = "../../tangram_core/rust" }
# acars = { path = "../../../../datalink/crates/acars" }
acars = { git = "https://github.com/xoolive/datalink.git", rev = "8e78d6d053e9c235d5a98a8d8d4c4e3942e06dee" }

anyhow = "1.0"
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
redis = { version = "1.0.2", features = ["tokio-comp"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
hex = "0.4"

pyo3 = { version = "0.27", features = ["extension-module"], optional = true }
pyo3-async-runtimes = { version = "0.27", features = ["attributes", "tokio-runtime"], optional = true }
pyo3-stub-gen = { version = "0.16", optional = true }

[[bin]]
name = "stub_gen_datalink"
path = "src/bin/stub_gen.rs"
required-features = ["stubgen"]

[features]
pyo3 = ["dep:pyo3", "dep:pyo3-async-runtimes"]
stubgen = ["pyo3", "dep:pyo3-stub-gen"]
